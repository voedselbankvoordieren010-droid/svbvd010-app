<!doctype html>

<html lang="nl">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0
    "
  />

  <title>
    SVBVD010 App
  </title>

  <link
    rel="stylesheet"
    href="./styles.css"
  />

</head>

<body>

  <div id="app">

    <!-- TOPBAR -->

    <div class="topbar">

      <div id="userMeta">
        Laden...
      </div>

      <button id="logoutBtn">
        Logout
      </button>

    </div>

    <!-- TABS -->

    <div class="tabs">

      <button
        class="
          tab-button
          is-active
        "
        data-tab="chat"
      >
        Chat
      </button>

      <button
        class="tab-button"
        data-tab="clients"
      >
        Cliënten
      </button>

      <button
        class="tab-button"
        data-tab="admin"
      >
        Admin
      </button>

    </div>

    <!-- CHAT -->

    <div
      id="chat"
      class="tab-panel"
    >

      <div id="chatConversations">
      </div>

      <div>

        <div id="chatHeader">
          Chat
        </div>

        <div id="chatList">
        </div>

        <div class="chat-input-row">

          <input
            id="chatInput"
            type="text"
            placeholder="
              Typ een bericht...
            "
          >

          <button id="sendChatBtn">
            Verzenden
          </button>

        </div>

      </div>

    </div>

    <!-- CLIENTS -->

    <div
      id="clients"
      class="
        tab-panel
        hidden
      "
    >
    </div>

    <!-- ADMIN -->

    <div
      id="admin"
      class="
        tab-panel
        hidden
      "
    >

      <div class="cards">

        <div class="card">

          <h3>
            Totaal
          </h3>

          <p id="adminTotal">
            0
          </p>

        </div>

        <div class="card">

          <h3>
            Wachtend
          </h3>

          <p id="adminPending">
            0
          </p>

        </div>

        <div class="card">

          <h3>
            Goedgekeurd
          </h3>

          <p id="adminApproved">
            0
          </p>

        </div>

      </div>

      <div
        id="userList"
        class="cards"
      >
      </div>

    </div>

    <!-- NOTIFICATIONS -->

    <div id="notifications">
    </div>

    <span id="notifCount">
    </span>

  </div>

  <script
    type="module"
    src="./js/main.js"
  ></script>

</body>

</html>
