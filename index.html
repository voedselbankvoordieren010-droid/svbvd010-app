<!doctype html>

<html lang="nl">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SVBVD010 PRO</title>

  <!-- FullCalendar CSS (local) -->
  <link rel="stylesheet" href="./fullcalendar-core.css">
  <link rel="stylesheet" href="./fullcalendar-daygrid.css">

  <!-- SEO -->
  <meta name="description" content="Hulpverlenersportaal van Stichting Voedselbank voor Dieren 010" />

  <!-- PWA -->

  <link
    rel="manifest"
    href="./manifest.json"
  />

  <meta
    name="theme-color"
    content="#ff6b00"
  />

  <!-- IOS -->

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- ICON -->

  <link
    rel="icon"
    href="./logo-192.png"
  />

  <style>
    .app-preloader {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      color: #1f2937;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
      padding: 24px;
      background: #fff8f0;
    }

    .app-preloader .brand-mark {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(135deg, #ff6b00, #ffa500);
      display: grid;
      place-items: center;
      box-shadow: 0 16px 40px rgba(255, 107, 0, 0.14);
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.04em;
      font-size: 0.95rem;
    }

    .app-preloader .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid rgba(255, 107, 0, 0.2);
      border-top-color: #ff6b00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .app-preloader .label {
      font-size: 1rem;
      color: #374151;
    }

    .app-preloader .subtext {
      font-size: 0.9rem;
      color: #6b7280;
      max-width: 280px;
      line-height: 1.5;
    }

    .app-preloader {
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .app-preloader.fade-out {
      opacity: 0;
      transform: scale(0.98);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="app-preloader">
      <div class="brand-mark">SVB</div>
      <div class="spinner"></div>
      <div class="label">SVBVD010 laden</div>
      <div class="subtext">Even geduld, de applicatie wordt geopend.</div>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js")
          .then(() => console.log("SW REGISTERED"))
          .catch(err => console.error("SW ERROR:", err));
      });
    }
  </script>
</body>

</html>
