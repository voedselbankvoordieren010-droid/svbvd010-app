<!doctype html>

<html lang="nl">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0
    "
  />

  <title>
    SVBVD010 PRO
  </title>

  <!-- FullCalendar CSS (local) -->
  <link rel="stylesheet" href="./fullcalendar-core.css">
  <link rel="stylesheet" href="./fullcalendar-daygrid.css">

  <!-- SEO -->

  <meta
    name="description"
    content="
      Hulpverlenersportaal van
      Stichting Voedselbank
      voor Dieren 010
    "
  />

  <!-- PWA -->

  <link
    rel="manifest"
    href="./manifest.json"
  />

  <meta
    name="theme-color"
    content="#ff6b00"
  />

  <!-- IOS -->

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- ICON -->

  <link
    rel="icon"
    href="./logo-192.png"
  />

</head>

<body>

  <div id="app">

    <!-- TOPBAR -->

    <header class="topbar">

      <div id="userMeta">
        Laden...
      </div>

      <div
        style="
          display:flex;
          align-items:center;
          gap:12px;
        "
      >

        <!-- NOTIFICATIONS -->

        <button
          id="notifBell"
          aria-label="
            Notificaties
          "
        >
          🔔
        </button>

        <span id="notifCount">
        </span>

        <!-- LOGOUT -->

        <button id="logoutBtn">
          Logout
        </button>

      </div>

    </header>

    <!-- TABS -->

    <nav class="tabs">

      <button
        class="
          tab-button
          is-active
        "
        data-tab="chat"
      >
        Chat
      </button>

      <button
        class="tab-button"
        data-tab="clients"
      >
        Cliënten
      </button>

      <button
        class="tab-button"
        data-tab="admin"
      >
        Admin
      </button>

    </nav>

    <!-- CHAT -->

    <main
      id="chat"
      class="tab-panel"
    >

      <div id="chatHeader">
        Chat
      </div>

      <div id="chatConversations">
      </div>

      <div id="chatList">
      </div>

      <div class="chat-input-row">

        <input
          id="chatInput"
          type="text"
          placeholder="
            Typ een bericht...
          "
          autocomplete="off"
        >

        <button id="sendChatBtn">
          Verzenden
        </button>

      </div>

    </main>

    <!-- CLIENTS -->

    <section
      id="clients"
      class="
        tab-panel
        hidden
      "
    >
    </section>

    <!-- ADMIN -->

    <section
      id="admin"
      class="
        tab-panel
        hidden
      "
    >

      <div class="cards">

        <div class="card">

          <h3>
            Totaal
          </h3>

          <p id="adminTotal">
            0
          </p>

        </div>

        <div class="card">

          <h3>
            Wachtend
          </h3>

          <p id="adminPending">
            0
          </p>

        </div>

        <div class="card">

          <h3>
            Goedgekeurd
          </h3>

          <p id="adminApproved">
            0
          </p>

        </div>

      </div>

      <div
        id="userList"
        class="cards"
      >
      </div>

    </section>

    <!-- NOTIFICATIONS PANEL -->

    <div
      id="notifications"
      class="hidden"
    >
    </div>

  </div>

  <!-- MAIN -->

  <script
    type="module"
    src="./js/main.js"
  ></script>

  <!-- SERVICE WORKER -->

  <script>

    if (
      "serviceWorker" in navigator
    ) {

      window.addEventListener(
        "load",
        () => {

          navigator
            .serviceWorker
            .register(
              "/service-worker.js"
            )

            .then(() => {

              console.log(
                "SW REGISTERED"
              );
            })

            .catch(err => {

              console.error(
                "SW ERROR:",
                err
              );
            });
        }
      );
    }

  </script>

</body>

</html>
