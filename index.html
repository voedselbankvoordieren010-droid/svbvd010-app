<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>svbvd010-app-new</title>
  </head>
  <body>
    <div id="app">

  <div class="topbar">

    <div id="userMeta">
      Laden...
    </div>

    <button id="logoutBtn">
      Logout
    </button>

  </div>

  <div class="tabs">

    <button
      class="tab-button is-active"
      data-tab="chat"
    >
      Chat
    </button>

    <button
      class="tab-button"
      data-tab="admin"
    >
      Admin
    </button>

  </div>

  <!-- CHAT -->
  <div
    id="chat"
    class="tab-panel"
  >

    <div id="chatHeader">
      Chat
    </div>

    <div id="chatConversations">
    </div>

    <div id="chatList">
    </div>

    <div class="chat-input-row">

      <input
        id="chatInput"
        type="text"
        placeholder="Typ een bericht..."
      >

      <button id="sendChatBtn">
        Verzenden
      </button>

    </div>

  </div>

  <!-- ADMIN -->
  <div
    id="admin"
    class="tab-panel hidden"
  >

    <div id="users">
    </div>

  </div>

  <!-- NOTIFICATIES -->
  <div id="notifications">
  </div>

  <span id="notifCount">
  </span>

</div>
    <script type="module" src="/js/main.js"></script>
  </body>
</html>
