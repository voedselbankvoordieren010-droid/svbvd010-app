<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVBVD010 PRO Login</title>
<style>
:root {
  --bg: #f5f5f5;
  --card: #ffffff;
  --text: #1f1f1f;
  --muted: #666666;
  --brand: #ff6600;
  --brand-dark: #dd5700;
  --border: #ececec;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #f8f8f8 0%, #efefef 100%);
  color: var(--text);
}

.topbar {
  background: #222;
  color: #fff;
  padding: 14px 18px;
  font-size: 28px;
  font-weight: bold;
}

.wrap {
  min-height: calc(100vh - 60px);
  display: grid;
  place-items: center;
  padding: 24px;
}

.card {
  width: 100%;
  max-width: 480px;
  background: var(--card);
  border-radius: 16px;
  padding: 28px;
  border: 1px solid var(--border);
  box-shadow: 0 18px 48px rgba(0, 0, 0, 0.08);
}

h1 {
  margin: 0 0 10px;
  font-size: 30px;
}

p {
  margin: 0 0 14px;
  color: var(--muted);
  line-height: 1.5;
}

.button {
  width: 100%;
  border: none;
  border-radius: 12px;
  background: var(--brand);
  color: #fff;
  padding: 14px 16px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.button:hover { background: var(--brand-dark); }
.button:disabled { opacity: 0.7; cursor: wait; }

.status {
  margin-top: 14px;
  min-height: 22px;
  font-size: 14px;
  color: var(--muted);
}

.note {
  margin-top: 18px;
  padding: 12px 14px;
  background: #fff8f2;
  border: 1px solid #ffe2c7;
  border-radius: 12px;
  color: #8a4b00;
  font-size: 14px;
}
</style>
</head>
<body>
  <div class="topbar">SVBVD010 PRO</div>

  <div class="wrap">
    <div class="card">
      <h1>Hulpverlenersportaal</h1>
      <p>Log in met je zakelijke Microsoft-account. Alleen goedgekeurde hulpverleners krijgen toegang tot het portaal.</p>
      <button id="loginBtn" class="button" type="button">Login met Microsoft</button>
      <div id="statusBox" class="status"></div>
      <div class="note">Prive Microsoft-accounts horen in Azure geblokkeerd te zijn. Zorg dat je app in Microsoft Entra op alleen organisatieaccounts staat.</div>
    </div>
  </div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL = "https://qybobqolknvovigickpy.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5Ym9icW9sa252b3ZpZ2lja3B5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjQ5NDEsImV4cCI6MjA5MDU0MDk0MX0.UvZjGttYTUAZnr49m3AUeBoM1nfUHWykEhSnsh8iVa8";
const PORTAAL_URL = new URL("./hulpverlenersportaal.html", window.location.href).href;

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const loginBtn = document.getElementById("loginBtn");
const statusBox = document.getElementById("statusBox");

function setStatus(message) {
  statusBox.textContent = message;
}

function redirectToPortaal() {
  window.location.href = PORTAAL_URL;
}

loginBtn.addEventListener("click", async () => {
  loginBtn.disabled = true;
  setStatus("Microsoft-login wordt geopend...");

  const { error } = await supabase.auth.signInWithOAuth({
    provider: "azure",
    options: {
      redirectTo: PORTAAL_URL,
      scopes: "email openid profile"
    }
  });

  if (error) {
    setStatus(error.message);
    loginBtn.disabled = false;
  }
});

const { data: sessionData } = await supabase.auth.getSession();
if (sessionData.session) {
  redirectToPortaal();
}

supabase.auth.onAuthStateChange((event, session) => {
  if (session) {
    redirectToPortaal();
  }
});
</script>
</body>
</html>
